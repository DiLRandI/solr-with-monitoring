services:
  jaeger:
    image: ${JAEGER_IMAGE:-cr.jaegertracing.io/jaegertracing/jaeger:2.16.0}
    container_name: jaeger
    networks:
      - solr-lab
    ports:
      - "16686:16686"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:16686/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  otel-collector:
    build:
      context: .
      dockerfile: docker/otel-collector/Dockerfile
      args:
        OTEL_COLLECTOR_BASE_IMAGE: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.148.0}
    image: ${OTEL_COLLECTOR_CUSTOM_IMAGE:-otel-collector-user-managed-lab:0.148.0}
    pull_policy: never
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - solr-lab
    ports:
      - "13133:13133"
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  solr-master:
    build:
      context: .
      dockerfile: docker/solr/Dockerfile
      args:
        SOLR_BASE_IMAGE: ${SOLR_BASE_IMAGE:-solr:10.0.0}
    image: ${SOLR_CUSTOM_IMAGE:-solr-user-managed-lab:10.0.0}
    pull_policy: never
    container_name: solr-master
    init: true
    command: ["solr-foreground", "--user-managed"]
    networks:
      - solr-lab
    ports:
      - "8983:8983"
    environment:
      SOLR_NODE_ROLE: master
      SOLR_MODULES: opentelemetry
      SOLR_HEAP: 512m
      SOLR_OPTS: -Dsolr.alwaysOnTraceId=true
      OTEL_SERVICE_NAME: solr-master
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=solr-lab,solr.node.role=master
    volumes:
      - solr_master_var:/var/solr
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8983/solr/admin/info/health | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"OK\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  solr-slave1:
    image: ${SOLR_CUSTOM_IMAGE:-solr-user-managed-lab:10.0.0}
    pull_policy: never
    container_name: solr-slave1
    init: true
    command: ["solr-foreground", "--user-managed"]
    networks:
      - solr-lab
    ports:
      - "8984:8983"
    environment:
      SOLR_NODE_ROLE: follower
      SOLR_MODULES: opentelemetry
      SOLR_HEAP: 512m
      # Followers need allowUrls so ReplicationHandler can reach the master in user-managed mode.
      SOLR_OPTS: -Dsolr.alwaysOnTraceId=true -Dsolr.security.allow.urls=http://solr-master:8983
      OTEL_SERVICE_NAME: solr-slave1
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=solr-lab,solr.node.role=follower
    volumes:
      - solr_slave1_var:/var/solr
    depends_on:
      otel-collector:
        condition: service_healthy
      solr-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8983/solr/admin/info/health | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"OK\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  solr-slave2:
    image: ${SOLR_CUSTOM_IMAGE:-solr-user-managed-lab:10.0.0}
    pull_policy: never
    container_name: solr-slave2
    init: true
    command: ["solr-foreground", "--user-managed"]
    networks:
      - solr-lab
    ports:
      - "8985:8983"
    environment:
      SOLR_NODE_ROLE: follower
      SOLR_MODULES: opentelemetry
      SOLR_HEAP: 512m
      # Followers need allowUrls so ReplicationHandler can reach the master in user-managed mode.
      SOLR_OPTS: -Dsolr.alwaysOnTraceId=true -Dsolr.security.allow.urls=http://solr-master:8983
      OTEL_SERVICE_NAME: solr-slave2
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=solr-lab,solr.node.role=follower
    volumes:
      - solr_slave2_var:/var/solr
    depends_on:
      otel-collector:
        condition: service_healthy
      solr-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8983/solr/admin/info/health | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"OK\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.10.0}
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --enable-feature=exemplar-storage
    networks:
      - solr-lab
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      solr-master:
        condition: service_healthy
      solr-slave1:
        condition: service_healthy
      solr-slave2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.4.2}
    container_name: grafana
    networks:
      - solr-lab
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

volumes:
  solr_master_var:
  solr_slave1_var:
  solr_slave2_var:
  prometheus_data:
  grafana_data:

networks:
  solr-lab:
    name: solr-lab
